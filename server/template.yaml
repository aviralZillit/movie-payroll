AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: movie-payroll Express API on Lambda + API Gateway

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Environment:
      Variables:
        NODE_ENV: production

Parameters:
  MongoDbUri:
    Type: String
    NoEcho: true
    Description: MongoDB connection string
  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret
  JwtRefreshSecret:
    Type: String
    NoEcho: true
    Description: JWT refresh token secret
  AllowedOrigins:
    Type: String
    Default: '*'
    Description: Comma-separated allowed CORS origins (set to your Amplify domain)

Resources:
  MoviePayrollApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/lambda.handler
      CodeUri: .
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref MoviePayrollApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref MoviePayrollApi
            Path: /
            Method: ANY
      Environment:
        Variables:
          MONGODB_URI: !Ref MongoDbUri
          JWT_SECRET: !Ref JwtSecret
          JWT_REFRESH_SECRET: !Ref JwtRefreshSecret
          JWT_EXPIRES_IN: '15m'
          JWT_REFRESH_EXPIRES_IN: '7d'
          ALLOWED_ORIGINS: !Ref AllowedOrigins

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${MoviePayrollApi}.execute-api.${AWS::Region}.amazonaws.com'
